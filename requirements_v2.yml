name: dropout_nnunet

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # ---- Core
  - python=3.10
  - pip
  - setuptools
  - wheel

  # ---- PyTorch + CUDA 11.8 (conda)
  - pytorch=2.6.0
  - torchvision=0.21.0
  - torchaudio=2.6.0
  - pytorch-cuda=11.8

  # ---- nnU-Net / DRP dependencies (conda-forge)
  - batchgenerators
  - fft-conv-pytorch
  - acvl-utils=0.2.1
  - connected-components-3d=3.22.0
  - dicom2nifti=2.5.1
  - dynamic-network-architectures=0.3.1
  - einops=0.8.1
  - graphviz=0.20.3
  - imagecodecs=2024.12.30
  - imageio=2.37.0
  - joblib=1.4.2
  - matplotlib=3.9.4
  - nibabel=5.3.2
  - numpy=1.26.3
  - pandas=2.2.3
  - pydicom=2.4.4
  - pyyaml=6.0.2
  - requests=2.32.3
  - scikit-image=0.24.0
  - scikit-learn=1.6.1
  - scipy=1.13.1
  - seaborn=0.13.2
  - simpleitk=2.4.1
  - tqdm=4.67.1
  - yacs=0.1.8
  - pillow
  - typing_extensions
  - networkx=3.2.1

  # ---- Keep pip minimal; editable installs happen after env creation
  - pip:
      - ""
