name: dropout_nnunet

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip
  - setuptools
  - wheel

  # --- PyTorch + CUDA 11.8 via conda (this is the important part)
  - pytorch=2.6.0
  - torchvision=0.21.0
  - torchaudio=2.6.0
  - pytorch-cuda=11.8

  # --- Install what DOES exist on conda-forge
  - numpy=1.26.3
  - scipy=1.13.1
  - pandas=2.2.3
  - scikit-learn=1.6.1
  - scikit-image=0.24.0
  - matplotlib=3.9.4
  - seaborn=0.13.2
  - nibabel=5.3.2
  - simpleitk=2.4.1
  - pyyaml=6.0.2
  - requests=2.32.3
  - tqdm=4.67.1
  - pillow
  - networkx=3.2.1
  - einops=0.8.1
  - joblib=1.4.2
  - imageio=2.37.0
  - imagecodecs=2024.12.30
  - pydicom=2.4.4
  - python-gdcm=3.0.24.1
  - dicom2nifti=2.5.1  # (if this is missing on your forge mirror, move it to pip below)

  # These you confirmed work with conda
  - batchgenerators
  - fft-conv-pytorch

  # --- pip-only deps (because conda can't find them)
  - pip:
      - acvl-utils==0.2.1
      - connected-components-3d==3.22.0
      - dynamic-network-architectures==0.3.1
      - graphviz==0.20.3
      - yacs==0.1.8
